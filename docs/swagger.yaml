definitions:
  beansack.BeanAggregate:
    description: BeanAggregate composes a `Bean` with the publisher's display fields
    properties:
      author:
        type: string
      categories:
        items:
          type: string
        type: array
      cluster_id:
        type: string
      comments:
        type: integer
      content:
        type: string
      content_type:
        type: string
      entities:
        items:
          type: string
        type: array
      image_url:
        type: string
      likes:
        description: Aggregated social metrics
        type: integer
      num_related:
        type: integer
      publish_date:
        format: date-time
        type: string
      regions:
        items:
          type: string
        type: array
      related:
        items:
          type: string
        type: array
      sentiments:
        items:
          type: string
        type: array
      shares:
        type: integer
      source:
        type: string
      source_base_url:
        description: Publisher display fields
        type: string
      source_description:
        type: string
      source_favicon:
        type: string
      source_site_name:
        type: string
      subscribers:
        type: integer
      summary:
        type: string
      tags:
        description: Computed tags merged from categories/regions/entities for display
        items:
          type: string
        type: array
      title:
        type: string
      trend_score:
        type: number
      url:
        type: string
    type: object
  beansack.Publisher:
    description: Publisher contains identifying and descriptive information about
      a publisher
    properties:
      source:
        type: string
      source_base_url:
        type: string
      source_description:
        type: string
      source_favicon:
        type: string
      source_site_name:
        type: string
    type: object
info:
  contact:
    email: soumitsrah@cafecito.tech
    name: Project Cafecito
    url: http://cafecito.tech
  description: Beans is an intelligent news & blogs aggregation and search service
    that curates fresh content from RSS feeds using AI-powered natural language queries
    and filters.
  license:
    name: MIT
  title: Beans API & MCP
  version: "0.1"
paths:
  /articles/latest:
    get:
      consumes:
      - application/json
      description: Retrieves the most recently published articles, sorted by publish
        date (newest first).
      parameters:
      - description: optional semantic search query (character length 3-512)
        in: query
        name: q
        type: string
      - default: 0.75
        description: embedding accuracy/similarity threshold (0.0-1.0)
        in: query
        maximum: 1
        minimum: 0
        name: acc
        type: number
      - description: content type filter (news, blog, post, etc.)
        in: query
        name: kind
        type: string
      - collectionFormat: csv
        description: case/whitespace-insensitive text search across categories, regions,
          entities (recommended)
        in: query
        items:
          type: string
        name: tags
        type: array
      - collectionFormat: csv
        description: precise category filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: categories
        type: array
      - collectionFormat: csv
        description: precise region filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: regions
        type: array
      - collectionFormat: csv
        description: precise entity filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: entities
        type: array
      - collectionFormat: csv
        description: publisher source filters (inclusive OR)
        in: query
        items:
          type: string
        name: sources
        type: array
      - description: published since date (YYYY-MM-DD, defaults to 7 days ago if omitted)
        format: date
        in: query
        name: from
        type: string
      - default: false
        description: include full article content
        in: query
        name: full_content
        type: boolean
      - default: 16
        description: page limit
        in: query
        maximum: 128
        minimum: 1
        name: limit
        type: integer
      - description: pagination offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: array of latest articles sorted by publish date
          schema:
            items:
              $ref: '#/definitions/beansack.BeanAggregate'
            type: array
        "400":
          description: 'bad request: invalid parameters'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 'unauthorized: missing or invalid API key'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: database or embedder error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get latest articles (reverse chronological)
      tags:
      - Articles
  /articles/search:
    get:
      consumes:
      - application/json
      description: Perform semantic (vector embedding) or tag-based search across
        all articles in the database.
      parameters:
      - description: semantic vector search query (character length 3-512, natural
          language)
        in: query
        name: q
        type: string
      - default: 0.75
        description: embedding accuracy/similarity threshold (0.0-1.0, higher = stricter
          match)
        in: query
        maximum: 1
        minimum: 0
        name: acc
        type: number
      - description: content type filter (news, blog, post, generated, comment, etc.)
        in: query
        name: content_type
        type: string
      - collectionFormat: csv
        description: specific article URLs to fetch directly (CSV)
        in: query
        items:
          type: string
        name: urls
        type: array
      - collectionFormat: csv
        description: case/whitespace-insensitive text search across categories, regions,
          entities (AND combination, recommended)
        in: query
        items:
          type: string
        name: tags
        type: array
      - collectionFormat: csv
        description: precise category topic filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: categories
        type: array
      - collectionFormat: csv
        description: precise geographic region filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: regions
        type: array
      - collectionFormat: csv
        description: precise named entity filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: entities
        type: array
      - collectionFormat: csv
        description: publisher/source ID filters (inclusive OR)
        in: query
        items:
          type: string
        name: sources
        type: array
      - description: published/updated since date (ISO 8601 date format YYYY-MM-DD)
        format: date
        in: query
        name: from
        type: string
      - default: false
        description: if true, include full article content (large payload)
        in: query
        name: full_content
        type: boolean
      - default: 16
        description: page limit (items per page)
        in: query
        maximum: 128
        minimum: 1
        name: limit
        type: integer
      - description: pagination offset (number of items to skip)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: array of article aggregates with engagement metrics
          schema:
            items:
              $ref: '#/definitions/beansack.BeanAggregate'
            type: array
        "400":
          description: 'bad request: missing required search parameters or invalid
            input'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 'unauthorized: missing or invalid API key'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: database or embedder error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Semantic/tag-based article search
      tags:
      - Articles
  /articles/top-headlines:
    get:
      consumes:
      - application/json
      description: Retrieves top trending headlines from the past 24 hours, ranked
        by trend score.
      parameters:
      - description: optional semantic search query (character length 3-512)
        in: query
        name: q
        type: string
      - default: 0.75
        description: embedding accuracy/similarity threshold (0.0-1.0)
        in: query
        maximum: 1
        minimum: 0
        name: acc
        type: number
      - description: content type filter (news, blog, post, etc.)
        in: query
        name: kind
        type: string
      - collectionFormat: csv
        description: case/whitespace-insensitive text search across categories, regions,
          entities (recommended)
        in: query
        items:
          type: string
        name: tags
        type: array
      - collectionFormat: csv
        description: precise category filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: categories
        type: array
      - collectionFormat: csv
        description: precise region filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: regions
        type: array
      - collectionFormat: csv
        description: precise entity filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: entities
        type: array
      - collectionFormat: csv
        description: publisher source filters (inclusive OR)
        in: query
        items:
          type: string
        name: sources
        type: array
      - default: false
        description: include full article content
        in: query
        name: full_content
        type: boolean
      - default: 16
        description: page limit
        in: query
        maximum: 128
        minimum: 1
        name: limit
        type: integer
      - description: pagination offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: array of top headlines from last 24h, sorted by trend_score
          schema:
            items:
              $ref: '#/definitions/beansack.BeanAggregate'
            type: array
        "400":
          description: 'bad request: invalid parameters'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 'unauthorized: missing or invalid API key'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: database or embedder error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get top headlines (last 24 hours)
      tags:
      - Articles
  /articles/trending:
    get:
      consumes:
      - application/json
      description: 'Retrieves trending articles ranked by trend score. Trend score
        is computed from:'
      parameters:
      - description: optional semantic search query (character length 3-512)
        in: query
        name: q
        type: string
      - default: 0.75
        description: embedding accuracy/similarity threshold (0.0-1.0, higher = stricter)
        in: query
        maximum: 1
        minimum: 0
        name: acc
        type: number
      - description: content type filter (news, blog, post, etc.)
        in: query
        name: kind
        type: string
      - collectionFormat: csv
        description: case/whitespace-insensitive text search across categories, regions,
          entities (recommended)
        in: query
        items:
          type: string
        name: tags
        type: array
      - collectionFormat: csv
        description: precise category filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: categories
        type: array
      - collectionFormat: csv
        description: precise region filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: regions
        type: array
      - collectionFormat: csv
        description: precise entity filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: entities
        type: array
      - collectionFormat: csv
        description: publisher source filters (inclusive OR)
        in: query
        items:
          type: string
        name: sources
        type: array
      - description: trending since date (YYYY-MM-DD, defaults to 7 days ago)
        format: date
        in: query
        name: from
        type: string
      - default: false
        description: include full article content
        in: query
        name: full_content
        type: boolean
      - default: 16
        description: page limit
        in: query
        maximum: 128
        minimum: 1
        name: limit
        type: integer
      - description: pagination offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: array of trending articles sorted by trend_score (descending)
          schema:
            items:
              $ref: '#/definitions/beansack.BeanAggregate'
            type: array
        "400":
          description: 'bad request: invalid parameters'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 'unauthorized: missing or invalid API key'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: database or embedder error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get trending articles
      tags:
      - Articles
  /health:
    get:
      description: Returns service health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - Health
  /publishers:
    get:
      description: Retrieves detailed metadata for one or more sources including site
        name, description, favicon, and RSS feed info.
      parameters:
      - collectionFormat: csv
        description: source IDs to fetch metadata for (required, comma-separated CSV)
        in: query
        items:
          type: string
        name: sources
        required: true
        type: array
      - default: 16
        description: page limit (items per page)
        in: query
        maximum: 128
        minimum: 1
        name: limit
        type: integer
      - description: pagination offset (number of items to skip)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: array of publisher metadata objects
          schema:
            items:
              $ref: '#/definitions/beansack.Publisher'
            type: array
        "400":
          description: 'bad request: missing or invalid sources parameter'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 'unauthorized: missing or invalid API key'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: database error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Query source metadata
      tags:
      - Publishers
  /publishers/sources:
    get:
      description: Retrieves a paginated list of unique publisher source IDs and identifiers.
      parameters:
      - default: 16
        description: page limit (items per page)
        in: query
        maximum: 128
        minimum: 1
        name: limit
        type: integer
      - description: pagination offset (number of items to skip)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: list of source/publisher ID strings
          schema:
            items:
              type: string
            type: array
        "401":
          description: 'unauthorized: missing or invalid API key'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: database error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List available sources
      tags:
      - Publishers
  /tags/categories:
    get:
      description: Retrieves a paginated list of unique article categories/topics
        discovered in the database.
      parameters:
      - default: 16
        description: page limit (items per page)
        in: query
        maximum: 128
        minimum: 1
        name: limit
        type: integer
      - description: pagination offset (number of items to skip)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: list of category strings
          schema:
            items:
              type: string
            type: array
        "401":
          description: 'unauthorized: missing or invalid API key'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: database error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List article categories
      tags:
      - Tags
  /tags/entities:
    get:
      description: Retrieves a paginated list of unique named entities (persons, organizations,
        products, places) extracted from articles.
      parameters:
      - default: 16
        description: page limit (items per page)
        in: query
        maximum: 128
        minimum: 1
        name: limit
        type: integer
      - description: pagination offset (number of items to skip)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: list of entity strings
          schema:
            items:
              type: string
            type: array
        "401":
          description: 'unauthorized: missing or invalid API key'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: database error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List named entities
      tags:
      - Tags
  /tags/regions:
    get:
      description: Retrieves a paginated list of unique geographic regions mentioned
        in articles.
      parameters:
      - default: 16
        description: page limit (items per page)
        in: query
        maximum: 128
        minimum: 1
        name: limit
        type: integer
      - description: pagination offset (number of items to skip)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: list of region strings
          schema:
            items:
              type: string
            type: array
        "401":
          description: 'unauthorized: missing or invalid API key'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: database error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List geographic regions
      tags:
      - Tags
schemes:
- https
swagger: "2.0"
